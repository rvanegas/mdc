# API key. Can also be set via ANTHROPIC_API_KEY environment variable.
anthropic_api_key = "sk-ant-..."

# Model used by "mdc reply". Default shown.
model = "claude-sonnet-4-6"

# System prompt file. If absent, a minimal built-in prompt is used.
system_prompt_file = "~/.config/mdc/system.md"

# Directory of markdown files to use as a knowledge library.
# Run "mdc index" to build INDEX.md from these files.
library_path = "~/notes"

# Model used by "mdc index" to summarize library documents. Default: claude-haiku-4-5.
# index_model = "claude-haiku-4-5"

# Column width for paragraph wrapping applied by "mdc fix" and "mdc reply". Default: 100.
# wrap_width = 100

# Section headings recognized as the user's own voice in transcripts.
# Used to classify documents during indexing and to validate reply targets.
# user_names = ["Prompt", "YourName"]

# Section headings recognized as LLM voice in transcripts.
# llm_names = ["Claude", "GPT"]


# --- OpenAI / Ollama ---

# OpenAI API key. Can also be set via OPENAI_API_KEY environment variable.
# openai_api_key = "sk-..."

# Ollama endpoint. Default shown.
# ollama_base_url = "http://localhost:11434/v1"
